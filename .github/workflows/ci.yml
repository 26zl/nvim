name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: stylua
        uses: JohnnyMorganz/stylua-action@76fd70c03e6340ceaf673366712db9b20560b402 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: v2.5.2
          args: --check .

      - name: shellcheck
        run: shellcheck install.sh install-vimrc.sh tests/installers.sh tests/fixtures/*

      - name: psscriptanalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -RequiredVersion 1.25.0 -Force -Scope CurrentUser
          $r = @('install.ps1', 'tests/install.ps1') | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_ -ExcludeRule PSAvoidUsingWriteHost
          }
          if ($r) { $r; exit 1 }

      - name: Install luacheck
        run: sudo apt-get update && sudo apt-get install -y luarocks && sudo luarocks install luacheck 1.2.0-1
      - name: luacheck
        run: luacheck init.lua tests/lockfile.lua

  smoke:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            neovim: v0.11.3
            sha256: 02b808a3ee8fc30161e07fe3c3edfb24b28bd0295323ac5dbdd8ec7012cac67d
            supported: true
          - os: ubuntu-latest
            neovim: v0.11.7
            sha256: 38a7c6317f94503841096c00e8fde05ef04b9472fc9d7d62b6e033cecd6f7991
            supported: true
          - os: macos-latest
            neovim: v0.11.7
            supported: true
          - os: windows-latest
            neovim: v0.11.7
            sha256: 7b10e6e08b14bf256422b72cfe706ef0452fd9c0a40e138426e1af09803d697f
            supported: true
          - os: ubuntu-latest
            neovim: v0.12.4
            sha256: 012bf3fcac5ade43914df3f174668bf64d05e049a4f032a388c027b1ebd78628
            supported: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: install neovim (linux)
        if: runner.os == 'Linux'
        run: |
          archive="$RUNNER_TEMP/nvim-linux-x86_64.tar.gz"
          curl -fsSLo "$archive" "https://github.com/neovim/neovim/releases/download/${{ matrix.neovim }}/nvim-linux-x86_64.tar.gz"
          printf '%s  %s\n' '${{ matrix.sha256 }}' "$archive" | sha256sum -c -
          tar xzf "$archive" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/nvim-linux-x86_64/bin" >> "$GITHUB_PATH"

      - name: install neovim (macos)
        if: runner.os == 'macOS'
        run: |
          arch=$(uname -m)
          case "$arch" in
            arm64) sha=9c84686ce84bbab725ff3d88ca3ac1d6da5a72128b68d9dd8094e34d4049a126 ;;
            x86_64) sha=014649c0c75e188fd70d40f787ee7cb83e7c2926264cd4e72c300d0198922371 ;;
            *) echo "unsupported macOS architecture: $arch"; exit 1 ;;
          esac
          archive="$RUNNER_TEMP/nvim-macos-$arch.tar.gz"
          curl -fsSLo "$archive" "https://github.com/neovim/neovim/releases/download/${{ matrix.neovim }}/nvim-macos-$arch.tar.gz"
          printf '%s  %s\n' "$sha" "$archive" | shasum -a 256 -c -
          tar xzf "$archive" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/nvim-macos-$arch/bin" >> "$GITHUB_PATH"

      - name: install neovim (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = Join-Path $env:RUNNER_TEMP 'nvim.zip'
          Invoke-WebRequest "https://github.com/neovim/neovim/releases/download/${{ matrix.neovim }}/nvim-win64.zip" -OutFile $archive
          if ((Get-FileHash $archive -Algorithm SHA256).Hash.ToLowerInvariant() -ne '${{ matrix.sha256 }}') {
            throw 'Neovim archive checksum mismatch.'
          }
          Expand-Archive $archive -DestinationPath $env:RUNNER_TEMP
          Add-Content $env:GITHUB_PATH "$env:RUNNER_TEMP\nvim-win64\bin"

      - name: installer tests (unix)
        if: runner.os != 'Windows'
        run: sh tests/installers.sh

      - name: installer tests (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tests/install.ps1

      - name: install config
        if: matrix.supported
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then dest="$LOCALAPPDATA/nvim"; else dest="$HOME/.config/nvim"; fi
          mkdir -p "$(dirname "$dest")" && cp -R . "$dest"

      - name: boot config and restore pinned plugins
        if: matrix.supported
        shell: bash
        run: |
          nvim --headless "+Lazy! restore" +qa
          if [ "$RUNNER_OS" = "Windows" ]; then data="$LOCALAPPDATA/nvim-data"; else data="$HOME/.local/share/nvim"; fi
          lock_entries="$RUNNER_TEMP/nvim-lock.tsv"
          jq -e 'type == "object" and all(.[]; type == "object" and (.commit | type == "string" and test("^[0-9a-f]{40}$")))' lazy-lock.json >/dev/null
          jq -r 'to_entries[] | "\(.key)\t\(.value.commit)"' lazy-lock.json | tr -d '\r' > "$lock_entries"
          fail=0
          while IFS=$'\t' read -r name commit; do
            have=$(git -C "$data/lazy/$name" rev-parse HEAD 2>/dev/null || echo missing)
            [ "$have" = "$commit" ] || { echo "MISMATCH $name: want $commit have $have"; fail=1; }
          done < "$lock_entries"
          NVIM_LOCKFILE="$GITHUB_WORKSPACE/lazy-lock.json" NVIM_LOCK_TEST="$GITHUB_WORKSPACE/tests/lockfile.lua" \
            nvim --headless '+lua dofile(vim.env.NVIM_LOCK_TEST)' +qa
          [ "$fail" -eq 0 ] && echo "SMOKE OK: all pinned plugins restored"
          exit $fail
